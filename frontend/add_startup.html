<!DOCTYPE html>
<html>
<head>
  <title>Add Startup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5" style="max-width:600px;">
  <h2>Register Your Startup</h2>

  <form action="/add_startup" method="POST">
    <div class="mb-3">
      <label>Startup Name</label>
      <input type="text" class="form-control" name="startup_name" required>
    </div>

    <div class="mb-3">
      <label>Domain</label>
      <input type="text" class="form-control" name="domain">
    </div>

    <div class="mb-3">
      <label>Description</label>
      <textarea class="form-control" name="description"></textarea>
    </div>

    <div class="mb-3">
      <label>Founded Date</label>
      <input type="date" class="form-control" name="founded_date">
    </div>

    <button type="submit" class="btn btn-success">Submit Startup</button>
  </form>
</div>

</body>
</html>
