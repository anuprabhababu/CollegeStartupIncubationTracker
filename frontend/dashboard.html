<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light p-3">

<div class="container d-flex justify-content-between align-items-center">

<h5 class="mb-0">Startup Incubation Tracker</h5>

<div>

<a href="profile.html" class="btn btn-outline-dark btn-sm me-2">
Profile
</a>

<button class="btn btn-outline-dark btn-sm" onclick="logout()">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<h4 id="welcomeText"></h4>

<!-- DASHBOARD CARDS -->
<div class="row mt-4 g-3">

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Register Startup</h5>
<a href="add_startup.html" class="btn btn-outline-dark mt-2">Open</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Startups</h5>
<a href="startups.html" class="btn btn-outline-dark mt-2">View</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Mentors</h5>
<a href="mentors.html" class="btn btn-outline-dark mt-2">View</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Progress</h5>
<a href="progress.html" class="btn btn-outline-dark mt-2">View</a>
</div>
</div>

</div>


<hr class="mt-5">

<!-- MY STARTUPS TABLE -->
<h4>My Startups</h4>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>Startup</th>
<th>Domain</th>
<th>Status</th>
</tr>
</thead>

<tbody id="startupTable"></tbody>

</table>

</div>


<script>

/* Get logged user */

const user = JSON.parse(localStorage.getItem("user"))

if(!user){
window.location.href="/login.html"
}

/* Welcome text */

document.getElementById("welcomeText").innerText =
"Welcome, " + user.name


/* Load startups */

async function loadStartups(){

try{

const res = await fetch("/api/startups")
const startups = await res.json()

const table = document.getElementById("startupTable")

table.innerHTML=""

startups.forEach(s => {

table.innerHTML += `
<tr>
<td>${s.startup_name}</td>
<td>${s.domain}</td>
<td>${s.current_status}</td>
</tr>
`

})

}catch(err){

console.error(err)

}

}

loadStartups()


/* Logout */

function logout(){

localStorage.removeItem("user")

window.location.href="/index.html"

}

</script>

</body>
</html>
