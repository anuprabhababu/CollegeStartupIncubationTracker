<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<nav class="navbar p-3">

<div class="container">

<h5 class="mb-0">Startup Incubation Tracker</h5>

<button class="btn btn-outline btn-sm" onclick="logout()">
Logout
</button>

</div>

</nav>

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-3">
<div class="dashboard-card">
<h5>Register Startup</h5>
<a href="add_startup.html" class="btn btn-outline w-100">Open</a>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<h5>Startups</h5>
<a href="startups.html" class="btn btn-outline w-100">View</a>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<h5>Mentors</h5>
<a href="mentors.html" class="btn btn-outline w-100">View</a>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<h5>Progress</h5>
<a href="progress.html" class="btn btn-outline w-100">View</a>
</div>
</div>

</div>

<hr class="mt-4">

<h4>My Startups</h4>

<table class="table table-bordered">

<thead>
<tr>
<th>Startup</th>
<th>Domain</th>
<th>Status</th>
</tr>
</thead>

<tbody id="startupTable"></tbody>

</table>

</div>

<script>

const user=JSON.parse(localStorage.getItem("user"))

if(!user){
window.location.href="/login.html"
}

async function loadStartups(){

const res=await fetch("/api/startups")
const data=await res.json()

const table=document.getElementById("startupTable")

table.innerHTML=""

data.forEach(s=>{

table.innerHTML+=`
<tr>
<td>${s.startup_name}</td>
<td>${s.domain}</td>
<td>${s.current_status}</td>
</tr>
`

})

}

loadStartups()

function logout(){
localStorage.removeItem("user")
window.location.href="/login.html"
}

</script>

</body>
</html>
