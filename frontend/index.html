<!DOCTYPE html>
<html>
<head>
  <title>Startup Incubation Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Incubation Tracker</a>
    <div>
      <a href="startups.html" class="btn btn-outline-light">View Startups</a>
      <a href="mentors.html" class="btn btn-outline-light">Mentors</a>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<div class="container text-center mt-5">
  <h1>College Startup Incubation Portal</h1>
  <p class="lead">Track startups, mentors, funding and innovation in one place</p>
  
  <a href="register.html" class="btn btn-success btn-lg">Register Now</a>
  <a href="startups.html" class="btn btn-info btn-lg">Explore Startups</a>
</div>

<!-- Stats Section -->
<div class="container mt-5">
  <div class="row text-center">
    <div class="col-md-4">
      <div class="card p-3">
        <h3>Total Startups</h3>
        <p id="startupCount">Loading...</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        <h3>Total Mentors</h3>
        <p id="mentorCount">Loading...</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        <h3>Total Funding</h3>
        <p id="fundingCount">₹0</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
