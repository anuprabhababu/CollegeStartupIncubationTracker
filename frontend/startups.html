<!DOCTYPE html>
<html>
<head>
<title>All Startups</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">Incubated Startups</h2>

<table class="table table-bordered mt-3">

<thead class="table-dark">
<tr>
<th>Startup Name</th>
<th>Domain</th>
<th>Status</th>
<th>Founded Date</th>
</tr>
</thead>

<tbody id="startupTable">
</tbody>

</table>

<a href="dashboard.html" class="btn btn-outline-dark">
Back to Dashboard
</a>

</div>

<script>

/* Check if user logged in */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="/login.html";
}

/* Load startups from backend */

async function loadStartups(){

try{

const res = await fetch("/api/startups");

const startups = await res.json();

const table = document.getElementById("startupTable");

table.innerHTML = "";

startups.forEach(startup => {

table.innerHTML += `
<tr>
<td>${startup.startup_name}</td>
<td>${startup.domain}</td>
<td>${startup.current_status}</td>
<td>${startup.founding_date ? startup.founding_date.split("T")[0] : ""}</td>
</tr>
`;

});

}catch(err){

console.error("Error loading startups:", err);

}

}

loadStartups();

</script>

</body>
</html>
