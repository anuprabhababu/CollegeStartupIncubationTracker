<!DOCTYPE html>
<html>
<head>

<title>Student Profile</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<div class="container mt-4" style="max-width:600px">

<h3>My Profile</h3>

<form id="profileForm">

<div class="mb-3">
<label>Student ID</label>
<input type="text" class="form-control" id="student_id" disabled>
</div>

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" id="name">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email" disabled>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" class="form-control" id="department">
</div>

<div class="mb-3">
<label>Year of Study</label>
<input type="number" class="form-control" id="year_of_study">
</div>

<div class="mb-3">
<label>Contact Number</label>
<input type="text" class="form-control" id="contact_number">
</div>

<button class="btn btn-primary">
Save Profile
</button>

</form>

<a href="dashboard.html" class="btn btn-outline-dark mt-3">
Back to Dashboard
</a>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="/login.html";
}

document.getElementById("student_id").value = user.id;
document.getElementById("email").value = user.email;

/* Load profile data */

async function loadProfile(){

const res = await fetch("/api/auth/profile/" + user.id);

const data = await res.json();

document.getElementById("name").value = data.name || "";
document.getElementById("department").value = data.department || "";
document.getElementById("year_of_study").value = data.year_of_study || "";
document.getElementById("contact_number").value = data.contact_number || "";

}

loadProfile();


/* Update profile */

document.getElementById("profileForm").addEventListener("submit", async function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const department = document.getElementById("department").value;
const year_of_study = document.getElementById("year_of_study").value;
const contact_number = document.getElementById("contact_number").value;

await fetch("/api/auth/profile",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
student_id:user.id,
name,
department,
year_of_study,
contact_number
})

});

alert("Profile updated");

});

</script>

</body>
</html>
