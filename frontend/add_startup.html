<!DOCTYPE html>
<html>
<head>
<title>Add Startup</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<div class="container mt-5" style="max-width:600px;">

<h2>Register Your Startup</h2>

<form id="startupForm">

<div class="mb-3">
<label>Startup Name</label>
<input type="text" class="form-control" id="startup_name" required>
</div>

<div class="mb-3">
<label>Domain</label>
<input type="text" class="form-control" id="domain">
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control" id="idea_description"></textarea>
</div>

<div class="mb-3">
<label>Founded Date</label>
<input type="date" class="form-control" id="founded_date">
</div>

<button type="submit" class="btn btn-success">
Submit Startup
</button>

</form>

<a href="dashboard.html" class="btn btn-outline-dark mt-3">
Back to Dashboard
</a>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Please login first");
window.location.href="/login.html";
}

document.getElementById("startupForm").addEventListener("submit", async function(e){

e.preventDefault();

const startup_name = document.getElementById("startup_name").value;
const domain = document.getElementById("domain").value;
const idea_description = document.getElementById("idea_description").value;
const founded_date = document.getElementById("founded_date").value;

const res = await fetch("/api/startups",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

startup_name,
domain,
idea_description,
founded_date,
student_id:user.id

})

});

const data = await res.json();

if(res.ok){

alert("Startup registered successfully");

window.location.href="/dashboard.html";

}else{

alert(data.error);

}

});

</script>

</body>
</html>
